<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0d0d14"/>

  <!-- Stave — neon orange -->
  <line x1="36" y1="40" x2="476" y2="40" stroke="#ff7722" stroke-width="9"/>
  <line x1="36" y1="148" x2="476" y2="148" stroke="#ff7722" stroke-width="9"/>
  <line x1="36" y1="256" x2="476" y2="256" stroke="#ff7722" stroke-width="9"/>
  <line x1="36" y1="364" x2="476" y2="364" stroke="#ff7722" stroke-width="9"/>
  <line x1="36" y1="472" x2="476" y2="472" stroke="#ff7722" stroke-width="9"/>

  <!-- Minim: hollow left-pointing triangle head on 2nd-lowest stave line -->
