<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viral Melody</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d14; }
    canvas { display: block; }
    #start {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0d0d14; color: #aaa; font: 18px/1.5 monospace;
      cursor: pointer; user-select: none; touch-action: manipulation;
    }
    #start span { border: 1px solid #444; padding: 12px 28px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="start"><span>click to start</span></div>

  <script src="./lib/Tone.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
